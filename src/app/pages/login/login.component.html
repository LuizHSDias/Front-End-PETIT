<div class="login-container">
  <div class="login-card">

    <!-- LOGO -->
    <div class="logo-container">

      <div class="logo-icon">
        <i class="bi bi-journal-bookmark-fill"></i>
      </div>

      <h1 class="logo-titulo">
        PETIT
      </h1>

    </div>

    <!-- TÍTULO -->
    <h2 class="titulo-login">
      Bem-vindo
    </h2>

    <form
      [formGroup]="formGroup"
      (ngSubmit)="onSubmit()"
    >

      <!-- USUÁRIO -->
      <div class="mb-4">

        <label
          for="login"
          class="form-label"
        >
          Usuário
        </label>

        <input
          id="login"
          type="text"
          class="form-control"
          formControlName="login"
          placeholder="000.000.000-00"
          maxlength="14"
          (input)="formatarCpf($event)"
        />

      </div>

      <!-- SENHA -->
      <div class="mb-4">

        <label
          for="senha"
          class="form-label"
        >
          Senha
        </label>

        <div class="password-wrapper">

          <input
            id="senha"
            [type]="mostrarSenha ? 'text' : 'password'"
            class="form-control"
            formControlName="senha"
            placeholder="Digite sua senha"
          />

          <button
            type="button"
            class="toggle-password"
            (click)="mostrarSenha = !mostrarSenha"
          >

            <i
              *ngIf="!mostrarSenha"
              class="bi bi-eye"
            ></i>

            <i
              *ngIf="mostrarSenha"
              class="bi bi-eye-slash"
            ></i>

          </button>

        </div>

      </div>

      <!-- BOTÃO ENTRAR -->
      <button
        type="submit"
        class="btn-entrar"
        [disabled]="formGroup.invalid"
      >
        ENTRAR
      </button>

      <!-- BOTÃO RECUPERAR SENHA -->
      <button
        type="button"
        class="btn-recuperar"
        routerLink="/recuperar-senha"
      >
        <i class="bi bi-key-fill"></i>
        ESQUECI MINHA SENHA
      </button>

    </form>

    <!-- LOADING -->
    <div
      *ngIf="mensagemDados"
      class="loading-login"
    >
      Aguarde, autenticando dados...
    </div>

    <!-- RODAPÉ -->
    <div class="footer-login">
      PETIT • CEFET-MG
    </div>

  </div>
</div>
