<div class="livro-form-container">

  <!-- 📚 TÍTULO -->
  <h2 class="titulo-pagina">

    {{ formGroup.value.id
      ? '✏️ Editar Livro'
      : '📚 Cadastrar Livro' }}

  </h2>

  <!-- 📄 FORM -->
  <form
    [formGroup]="formGroup"
    (ngSubmit)="onSubmit()"
    novalidate
  >

    <!-- 🔹 TÍTULO -->
    <div class="mb-4">

      <label for="titulo" class="form-label">
        Título
      </label>

      <input
        id="titulo"
        type="text"
        class="form-control"
        formControlName="titulo"
        [ngClass]="{
          'is-invalid':
          formGroup.get('titulo')?.invalid &&
          formGroup.get('titulo')?.touched
        }"
      />

      <div class="invalid-feedback">
        O título é obrigatório.
      </div>

    </div>

    <!-- 🔹 AUTOR / EDITORA -->
    <div class="row mb-4">

      <div class="col-md-6">

        <label for="autor" class="form-label">
          Autor
        </label>

        <input
          id="autor"
          type="text"
          class="form-control"
          formControlName="autor"
          [ngClass]="{
            'is-invalid':
            formGroup.get('autor')?.invalid &&
            formGroup.get('autor')?.touched
          }"
        />

        <div class="invalid-feedback">
          O autor é obrigatório.
        </div>

      </div>

      <div class="col-md-6">

        <label for="editora" class="form-label">
          Editora
        </label>

        <input
          id="editora"
          type="text"
          class="form-control"
          formControlName="editora"
          [ngClass]="{
            'is-invalid':
            formGroup.get('editora')?.invalid &&
            formGroup.get('editora')?.touched
          }"
        />

        <div class="invalid-feedback">
          A editora é obrigatória.
        </div>

      </div>

    </div>

    <!-- 🔹 ANO / ISBN / GÊNERO -->
    <div class="row mb-4">

      <div class="col-md-3">

        <label for="ano" class="form-label">
          Ano
        </label>

        <input
          id="ano"
          type="number"
          class="form-control"
          formControlName="ano"
          [ngClass]="{
            'is-invalid':
            formGroup.get('ano')?.invalid &&
            formGroup.get('ano')?.touched
          }"
        />

        <div class="invalid-feedback">
          O ano é obrigatório.
        </div>

      </div>

      <div class="col-md-4">

        <label for="isbn" class="form-label">
          ISBN
        </label>

        <input
          id="isbn"
          type="text"
          class="form-control"
          formControlName="isbn"
          [ngClass]="{
            'is-invalid':
            formGroup.get('isbn')?.invalid &&
            formGroup.get('isbn')?.touched
          }"
        />

        <div class="invalid-feedback">
          O ISBN é obrigatório.
        </div>

      </div>

      <div class="col-md-5">

        <label for="genero" class="form-label">
          Gênero
        </label>

        <input
          id="genero"
          type="text"
          class="form-control"
          formControlName="genero"
          [ngClass]="{
            'is-invalid':
            formGroup.get('genero')?.invalid &&
            formGroup.get('genero')?.touched
          }"
        />

        <div class="invalid-feedback">
          O gênero é obrigatório.
        </div>

      </div>

    </div>

    <!-- 🔥 BOTÕES -->
    <div class="botoes-formulario">

      <a
        routerLink="/livros"
        class="btn-cancelar"
      >
        Cancelar
      </a>

      <button
        type="submit"
        class="btn-salvar"
        [disabled]="formGroup.invalid"
      >

        {{ formGroup.value.id
          ? 'Atualizar'
          : 'Cadastrar' }}

      </button>

    </div>

  </form>

</div>
