<div class="emprestimo-form-container">

  <!-- 📖 TÍTULO -->
  <h2 class="titulo-pagina">

    {{ formGroup.value.id
      ? '✏️ Editar Empréstimo'
      : '📖 Cadastrar Empréstimo' }}

  </h2>

  <!-- 📄 FORM -->
  <form
    [formGroup]="formGroup"
    (ngSubmit)="onSubmit()"
  >

    <!-- 🔹 LIVRO / PETIANO -->
    <div class="row mb-4">

      <div class="col-md-6">

        <label for="livro" class="form-label">
          Livro
        </label>

        <select
          class="form-select"
          formControlName="livro"
        >

          <option [ngValue]="null" disabled>
            Selecione um livro
          </option>

          <option
            *ngFor="let livro of listaLivros"
            [ngValue]="livro"
          >

            {{ livro.titulo }}

          </option>

        </select>

        <div class="invalid-feedback">
          O livro é obrigatório.
        </div>

      </div>

      <div class="col-md-6">

        <label for="petiano" class="form-label">
          Petiano
        </label>

        <select
          class="form-select"
          formControlName="petiano"
        >

          <option [ngValue]="null" disabled>
            Selecione um petiano
          </option>

          <option
            *ngFor="let petiano of listaPetianos"
            [ngValue]="petiano"
          >

            {{ petiano.estudante?.nome }}

          </option>

        </select>

        <div class="invalid-feedback">
          O petiano é obrigatório.
        </div>

      </div>

    </div>

    <!-- 🔹 ESTUDANTE / DATA -->
    <div class="row mb-4">

      <div class="col-md-6">

        <label for="estudante" class="form-label">
          Estudante
        </label>

        <select
          class="form-select"
          formControlName="estudante"
        >

          <option [ngValue]="null" disabled>
            Selecione um estudante
          </option>

          <option
            *ngFor="let estudante of listaEstudantes"
            [ngValue]="estudante"
          >

            {{ estudante.nome }}

          </option>

        </select>

        <div class="invalid-feedback">
          O estudante é obrigatório.
        </div>

      </div>

      <div class="col-md-6">

        <label for="dataEmprestimo" class="form-label">
          Data Empréstimo
        </label>

        <input
          id="dataEmprestimo"
          type="date"
          class="form-control"
          formControlName="dataEmprestimo"
        />

      </div>

    </div>

    <!-- 🔹 PRAZO / DEVOLUÇÃO -->
    <div class="row mb-4">

      <div class="col-md-6">

        <label for="prazoMaximo" class="form-label">
          Prazo Máximo
        </label>

        <input
          id="prazoMaximo"
          type="date"
          class="form-control"
          formControlName="prazoMaximo"
        />

      </div>

      <div class="col-md-6">

        <label for="dataDevolucao" class="form-label">
          Data Devolução
        </label>

        <input
          id="dataDevolucao"
          type="date"
          class="form-control"
          formControlName="dataDevolucao"
        />

      </div>

    </div>

    <!-- 🔥 BOTÕES -->
    <div class="botoes-formulario">

      <a
        routerLink="/emprestimos"
        class="btn-cancelar"
      >
        Cancelar
      </a>

      <button
        type="submit"
        class="btn-salvar"
        [disabled]="formGroup.invalid"
      >

        {{ formGroup.value.id
          ? 'Atualizar'
          : 'Salvar' }}

      </button>

    </div>

  </form>

</div>
