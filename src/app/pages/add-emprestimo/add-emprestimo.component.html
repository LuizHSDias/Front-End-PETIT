<div class="container mt-4">
    <h2 class="mb-4 border-bottom border-3 border-danger">Cadastrar Empréstimo</h2>

     <form [formGroup]="formGroup" (ngSubmit)="onSubmit()">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label for="livro" class="form-label">Livro</label>
                <select class="form-select" formControlName="livro">
                <option [ngValue]="null" disabled selected>Selecione um Livro</option>
                <option *ngFor="let livro of listaLivros" [ngValue]="livro">{{ livro.titulo }}</option>
               </select>
                <div class="invalid-feedback">O Livro é obrigatório.</div>
            </div>

            <div class="col-md-6 mb-3">
                <label for="petiano" class="form-label">Petiano</label>
                <select class="form-select" formControlName="petiano">
                <option [ngValue]="null" disabled selected>Selecione um Petiano</option>
                <option *ngFor="let petiano of listaPetianos" [ngValue]="petiano">{{ petiano.estudante?.nome}}</option>
              </select>
              <div class="invalid-feedback">O Petiano é obrigatório.</div>
            </div>

        </div>

        <div class="row">

            <div class="col-md-6 mb-3">
                <label for="estudante" class="form-label">Estudante</label>
                <select class="form-select" formControlName="estudante">
                <option [ngValue]="null" disabled>Selecione um Estudante</option>
                <option *ngFor="let estudante of listaEstudantes" [ngValue]="estudante">{{ estudante?.nome}}</option>
                </select>
                <div class="invalid-feedback">O Petiano é obrigatório.</div>
            </div>

            <div class="col-md-6 mb-3">
                <label for="dataEmprestimo" class="form-label">Data Empréstimo</label>
                <input id="dataEmprestimo" type="date" class="form-control" formControlName="dataEmprestimo"/>
            </div>

        </div>

        <div class="row">

            <div class="col-md-6 mb-3">
              <label for="prazoMaximo" class="form-label">Prazo Máximo</label>
              <input id="prazoMaximo" type="date" class="form-control" formControlName="prazoMaximo"/>
            </div>

              <div class="col-md-6 mb-3">
              <label for="dataDevolucao" class="form-label">Data Devolução</label>
              <input id="dataDevolucao" type="date" class="form-control" formControlName="dataDevolucao"/>
            </div>
        </div>

        <div class="d-flex justify-content-between">
            <a routerLink="/emprestimos" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-success" [disabled]="formGroup.invalid">Salvar</button>
        </div>

    </form>
</div>
