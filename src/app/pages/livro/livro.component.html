<div class="container mt-5">

  <h2 class="mb-4 text-primary fw-bold border-bottom pb-2">
    Livros
  </h2>

  <!-- Botão Cadastrar -->
  <div class="d-flex justify-content-end mb-3">
    <a routerLink="/add-livro" class="btn btn-primary btn-lg shadow-sm">
      + Cadastrar
    </a>
  </div>

  <!-- Spinner de carregamento -->
  <div *ngIf="mensagemDados" class="text-center my-3">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Carregando...</span>
    </div>
    <p class="mt-2">Aguarde, carregando dados...</p>
  </div>

  <!-- Tabela responsiva -->
  <div class="table-responsive" *ngIf="!mensagemDados && lista.length > 0">
    <table class="table table-striped table-hover align-middle shadow-sm rounded">
      <thead class="table-dark">
        <tr>
          <th>Título</th>
          <th>Autor</th>
          <th>Editora</th>
          <th>Ano</th>
          <th>ISBN</th>
          <th class="text-center">Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let livro of lista">
          <td>{{ livro.titulo }}</td>
          <td>{{ livro.autor }}</td>
          <td>{{ livro.editora }}</td>
          <td>{{ livro.ano }}</td>
          <td>{{ livro.isbn }}</td>
          <td class="text-center">
            <button class="btn btn-sm btn-warning me-2" (click)="editar(livro.id)">
              Editar
            </button>
            <button class="btn btn-sm btn-danger" (click)="excluir(livro.id!)">
              Excluir
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Mensagem caso não haja dados -->
  <div *ngIf="!mensagemDados && lista.length === 0" class="alert alert-info text-center mt-3">
    Nenhum livro encontrado.
  </div>

</div>
