<div class="livros-container">

  <!-- 🔥 TÍTULO -->
  <h2 class="titulo-pagina">
    📚 Livros
  </h2>

  <!-- 🔍 BUSCA -->
  <div class="busca-container">

    <input
      type="text"
      class="input-busca"
      placeholder="Buscar por título..."
      [(ngModel)]="filtroTitulo"
    />

    <button class="btn-buscar" (click)="buscarPorTitulo()">
      🔍 Buscar
    </button>

  </div>

  <!-- ➕ BOTÃO -->
  <div class="acoes-topo">

    <a routerLink="/add-livro" class="btn-cadastrar">
      + Cadastrar
    </a>

  </div>

  <!-- ⏳ LOADING -->
  <div *ngIf="mensagemDados" class="loading-container">

    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Carregando...</span>
    </div>

    <p class="mt-2">Aguarde, carregando dados...</p>

  </div>

  <!-- 📚 TABELA -->
  <div class="table-responsive"
       *ngIf="!mensagemDados && lista.length > 0">

    <table class="table-livros">

      <thead>
        <tr>
          <th>Título</th>
          <th>Autor</th>
          <th>Editora</th>
          <th>Ano</th>
          <th>ISBN</th>
          <th>Gênero</th>
          <th class="text-center">Ações</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let livro of lista">

          <td>{{ livro.titulo }}</td>
          <td>{{ livro.autor }}</td>
          <td>{{ livro.editora }}</td>
          <td>{{ livro.ano }}</td>
          <td>{{ livro.isbn }}</td>
          <td>{{ livro.genero }}</td>

          <td class="text-center">

            <button class="btn-editar"
                    (click)="editar(livro.id)">
              ✏️ Editar
            </button>

            <button class="btn-excluir"
                    (click)="excluir(livro.id!)">
              🗑️ Excluir
            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

  <!-- ❌ SEM DADOS -->
  <div *ngIf="!mensagemDados && lista.length === 0"
       class="sem-dados">

    Nenhum livro encontrado.

  </div>

</div>
