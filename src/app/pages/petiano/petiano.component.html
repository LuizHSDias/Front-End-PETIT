<div class="petianos-container">

  <!-- 👥 TÍTULO -->
  <h2 class="titulo-pagina">
    👥 Petianos
  </h2>

  <!-- ➕ BOTÃO -->
  <div class="acoes-topo">

    <a routerLink="/add-petiano" class="btn-cadastrar">
      + Cadastrar
    </a>

  </div>

  <!-- ⏳ LOADING -->
  <div *ngIf="mensagemDados" class="loading-container">

    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Carregando...</span>
    </div>

    <p class="mt-2">Aguarde, carregando dados...</p>

  </div>

  <!-- 📋 TABELA -->
  <div class="table-responsive"
       *ngIf="!mensagemDados && lista.length > 0">

    <table class="table-petianos">

      <thead>
        <tr>
          <th>Data Entrada</th>
          <th>Estudante</th>
          <th>Tipo</th>
          <th>Login</th>
          <th>Nível</th>
          <th class="text-center">Ações</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let petiano of lista">

          <td>{{ petiano.dataEntrada }}</td>

          <td>
            {{ petiano.estudante?.nome }}
          </td>

          <td>
            {{ petiano.tipo }}
          </td>

          <td>
            {{ petiano.login }}
          </td>

          <td>

            <span
              class="badge-nivel"
              [ngClass]="{
                'admin': petiano.nivelAcesso === 'ADMIN',
                'petiano': petiano.nivelAcesso === 'PETIANO'
              }">

              {{ petiano.nivelAcesso }}

            </span>

          </td>

          <td class="text-center">

            <button class="btn-editar"
                    (click)="editar(petiano.id)">
              ✏️ Editar
            </button>

            <button class="btn-excluir"
                    (click)="excluir(petiano.id!)">
              🗑️ Excluir
            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

  <!-- ❌ SEM DADOS -->
  <div *ngIf="!mensagemDados && lista.length === 0"
       class="sem-dados">

    Nenhum petiano encontrado.

  </div>

</div>
